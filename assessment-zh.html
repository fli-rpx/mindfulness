<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="copyright" content="© 2026 正念疗法。保留所有权利。">
    <title>AI评估 - 正念疗法</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #fafaf9;
            --surface: #ffffff;
            --text: #1c1917;
            --muted: #78716c;
            --border: #e7e5e4;
            --accent: #0d9488;
            --accent-dark: #0f766e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        h1, h2, h3 { font-family: 'Cormorant Garamond', serif; font-weight: 500; }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(30, 58, 138, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }
        .nav-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
            text-decoration: none;
        }
        .nav-links { display: flex; gap: 0.25rem; }
        .nav-link {
            padding: 0.5rem 1rem;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .nav-link:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-link.active { color: var(--accent); background: rgba(13,148,136,0.2); }

        /* 工具 Dropdown */
        .tools-dropdown-container { position: relative; display: inline-block; }
        .tools-dropdown-btn {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.5rem 1rem;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.8);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .tools-dropdown-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .tools-dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 0.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            min-width: 220px;
            padding: 0.5rem;
            z-index: 9999;
        }
        .tools-dropdown-menu.open { display: block; }
        .tools-dropdown-menu a {
            display: block;
            padding: 0.75rem 1rem;
            color: var(--text);
            text-decoration: none;
            font-size: 0.875rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tools-dropdown-menu a:hover { background: rgba(13,148,136,0.1); color: var(--accent); }

        /* Hero */
        .hero {
            padding: 80px 2rem 20px;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59, 130, 246, 0.2), transparent),
                linear-gradient(180deg, #1e3a8a 0%, #1e40af 50%, var(--bg) 100%);
            color: white;
        }
        .hero h1 { color: white; }
        .hero-subtitle { color: rgba(255,255,255,0.9); }
        .hero-container {
            max-width: 720px;
            margin: 0 auto;
            text-align: center;
        }
        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(13,148,136,0.1);
            border: 1px solid rgba(13,148,136,0.2);
            border-radius: 100px;
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1.5rem;
        }
        .hero h1 {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            line-height: 1.1;
            margin-bottom: 1.25rem;
        }
        .hero-subtitle {
            font-size: 1.125rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Main Content */
        .content-main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 2rem;
        }

        .assessment-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            max-width: 800px;
            margin: 0 auto;
        }

        .question {
            margin-bottom: 1.5rem;
        }

        .question h3 {
            font-size: 1rem;
            margin-bottom: 0.75rem;
            color: var(--text);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .option {
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option:hover {
            background: var(--bg);
            border-color: var(--accent);
        }

        .submit-btn {
            background: var(--accent);
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 1rem;
        }
        .submit-btn:hover {
            background: var(--accent-dark);
        }

        @media (max-width: 768px) {
            .hero { padding: 140px 1rem 80px; }
            .content-main { padding: 2rem 1rem; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-container">
            <a href="index-zh.html" class="nav-logo">🧘 正念疗法</a>
            <div class="nav-links">
                <a href="index-zh.html" class="nav-link">首页</a>
                <a href="cycle-zh.html" class="nav-link">周期</a>
                <a href="assessment-zh.html" class="nav-link active">AI对话</a>

                <div class="tools-dropdown-container">
                    <button class="tools-dropdown-btn" onclick="toggleToolsDropdown(this)">
                        工具 <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="tools-dropdown-menu">
                        <a href="emotion-explorer-zh.html">🎨 情绪探索</a>
                        <a href="emotion-balance-zh.html">⚡ 情绪平衡</a>
                        <a href="hypnosis-zh.html">🌀 催眠疗法</a>
                        <a href="salad-compass-zh.html">🥗 沙拉罗盘</a>
                        <a href="salad-check-zh.html">🥬 完整沙拉检测</a>
                        <a href="interventions-zh.html">🧰 干预工具</a>
                    </div>
                </div>

                <a href="journal-zh.html" class="nav-link">日记</a>
                <a href="progress-zh.html" class="nav-link">进度</a>
                <a href="learn-zh.html" class="nav-link">学习</a>
                <a href="assessment-zh.html" class="nav-link">英语</a>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-container">
            <div class="hero-eyebrow">🤖 AI对话</div>
            <h1>AI评估</h1>
            <p class="hero-subtitle">与AI助手对话，获得个性化的情绪健康评估和建议</p>
        </div>
    </section>

    <main class="content-main">
        <div class="assessment-card">
            <h2>情绪健康评估</h2>
            <p style="color: var(--muted); margin-bottom: 1.5rem;">回答以下问题，帮助我们了解你的情绪状态。</p>

            <div class="question">
                <h3>1. 你最近感到焦虑或紧张的频率如何？</h3>
                <div class="options">
                    <div class="option">完全没有</div>
                    <div class="option">偶尔</div>
                    <div class="option">经常</div>
                    <div class="option">几乎每天</div>
                </div>
            </div>

            <div class="question">
                <h3>2. 你的睡眠质量如何？</h3>
                <div class="options">
                    <div class="option">很好</div>
                    <div class="option">一般</div>
                    <div class="option">不太好</div>
                    <div class="option">很差</div>
                </div>
            </div>

            <button class="submit-btn">提交评估</button>
        </div>
    </main>

    <script>
        function toggleToolsDropdown(btn) {
            const menu = btn.nextElementSibling;
            menu.classList.toggle('open');
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.tools-dropdown-container')) {
                document.querySelectorAll('.tools-dropdown-menu').forEach(menu => {
                    menu.classList.remove('open');
                });
            }
        });
    </script>
</body>
</html>
