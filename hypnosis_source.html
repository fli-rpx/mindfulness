<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Emotional Balance - Self-Hypnosis</title>
    
    <!-- CSS to hide gradient overlays -->
    <style>
      /* Hide all gradient overlays that could be in Safe Place section */
      .absolute.inset-0[class*="bg-gradient"],
      .absolute.inset-0[class*="gradient-to"],
      div.absolute[class*="from-"],
      div.absolute[class*="to-"] {
        display: none !important;
      }
    </style>
    
    <script type="module" crossorigin="" src="hypnosis_source.js"></script>
    <link rel="stylesheet" crossorigin="" href="hypnosis_source.css"/>
    <base href="./">
  </head>
  <body>
    <div id="root"></div>
  
    <!-- Audio for Safe Place Technique -->
    <audio id="safePlaceMusic" loop>
      <source src="sanctuary-of-light.mp3" type="audio/mpeg"/>
    </audio>
    
    <!-- Audio for Journey Section -->
    <audio id="journeyMusic" loop>
      <source src="sanctuary-of-stillness.mp3" type="audio/mpeg"/>
    </audio>
    
    <script>
      (function() {
        const safePlaceAudio = document.getElementById('safePlaceMusic');
        const journeyAudio = document.getElementById('journeyMusic');
        
        document.addEventListener('click', function(e) {
          const btn = e.target.closest('button');
          if (!btn) return;
          
          const text = btn.textContent.toLowerCase();
          
          // Safe Place buttons
          if (text.includes('begin visualization')) {
            if (safePlaceAudio.paused) {
              safePlaceAudio.play().catch(function(e) { console.log('Audio blocked:', e); });
            }
          } else if (text.includes('end visualization')) {
            if (!safePlaceAudio.paused) {
              safePlaceAudio.pause();
              safePlaceAudio.currentTime = 0;
            }
          }
          
          // Journey Section - Begin Your Journey (hero button) - also resets to step 1
          else if (text.includes('begin your journey')) {
            if (journeyAudio.paused) {
              journeyAudio.play().catch(function(e) { console.log('Journey audio blocked:', e); });
            }
            
            // Reset journey to step 1
            setTimeout(function() {
              const stepIndicators = document.querySelectorAll('.step-badge, [class*="step"], [class*="Step"]');
              for (let indicator of stepIndicators) {
                if (indicator.textContent.toLowerCase().includes('step')) {
                  indicator.textContent = 'Step 1 of 6';
                  console.log('Journey reset to step 1');
                  break;
                }
              }
              
              // Try to find and click step 1 button
              const allButtons = document.querySelectorAll('button');
              for (let btn of allButtons) {
                if (btn.textContent === '1' || 
                    btn.getAttribute('data-step') === '1' ||
                    btn.className.includes('step-1')) {
                  btn.click();
                  break;
                }
              }
            }, 100);
          }
          
          // Journey Section - Next Step
          else if (text.includes('next step') || text.includes('next')) {
            // Check if in Journey section
            let parent = btn.parentElement;
            let inJourney = false;
            for (let i = 0; i < 5; i++) {
              if (!parent) break;
              if (parent.textContent.toLowerCase().includes('self-hypnosis journey') ||
                  parent.textContent.toLowerCase().includes('your journey') ||
                  parent.textContent.toLowerCase().includes('step')) {
                inJourney = true;
                break;
              }
              parent = parent.parentElement;
            }
            
            if (inJourney && journeyAudio.paused) {
              journeyAudio.play().catch(function(e) { console.log('Journey audio blocked:', e); });
            }
          }
          
          // Journey Section - Previous (only if not playing)
          else if (text.includes('previous') || text.includes('back')) {
            if (journeyAudio.paused) {
              journeyAudio.play().catch(function(e) { console.log('Journey audio blocked:', e); });
            }
          }
          
          // Journey Section - Complete
          else if (text.includes('complete') || text.includes('finish')) {
            if (!journeyAudio.paused) {
              journeyAudio.pause();
              journeyAudio.currentTime = 0;
            }
            if (!safePlaceAudio.paused) {
              safePlaceAudio.pause();
              safePlaceAudio.currentTime = 0;
            }
          }
        });
        
        console.log('Dual audio control loaded');
      })();
    </script>
  </body>
</html>
