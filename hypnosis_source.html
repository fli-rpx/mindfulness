<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Emotional Balance - Self-Hypnosis</title>
    <script type="module" crossorigin="" src="hypnosis_source.js"></script>
    <link rel="stylesheet" crossorigin="" href="hypnosis_source.css"/>
    <base href="./">
    <style>
      body { margin: 0; min-height: 100vh; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  
    <!-- Audio for Safe Place Technique -->
    <audio id="safePlaceMusic" loop>
      <source src="sanctuary-of-light.mp3" type="audio/mpeg"/>
    </audio>
    
    <script>
      // Hook into EXISTING "Begin Visualization" button
      (function() {
        let attempts = 0;
        const maxAttempts = 60; // Try for 30 seconds
        
        const findButton = setInterval(function() {
          attempts++;
          
          // Find button with "Begin Visualization" text
          const buttons = document.querySelectorAll('button');
          let targetBtn = null;
          
          for (let btn of buttons) {
            if (btn.textContent.includes('Begin Visualization') || 
                btn.textContent.includes('Begin Journey')) {
              targetBtn = btn;
              break;
            }
          }
          
          if (targetBtn && !targetBtn.dataset.audioHooked) {
            clearInterval(findButton);
            targetBtn.dataset.audioHooked = 'true';
            
            const audio = document.getElementById('safePlaceMusic');
            
            // Hook into existing click handler
            targetBtn.addEventListener('click', function() {
              // Small delay to let React handle its own logic first
              setTimeout(function() {
                if (audio.paused) {
                  audio.play().catch(function(e) {
                    console.log('Audio autoplay blocked:', e);
                  });
                }
              }, 100);
            });
            
            console.log('Audio hooked to existing Begin Visualization button');
          }
          
          if (attempts >= maxAttempts) {
            clearInterval(findButton);
            console.log('Could not find Begin Visualization button');
          }
        }, 500);
      })();
    </script>
  </body>
</html>
