<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Emotional Balance - Self-Hypnosis</title>
    <script type="module" crossorigin="" src="hypnosis_source.js"></script>
    <link rel="stylesheet" crossorigin="" href="hypnosis_source.css"/>
    <base href="./">
    <style>
      body { margin: 0; min-height: 100vh; }
      #root { min-height: 100vh; }
      /* Force all cards/glass panels to be transparent */
      .glass-card, [class*="glass"], [class*="Glass"], 
      .card, [class*="card"], [class*="Card"],
      div[style*="backdrop-filter"], div[style*="background: rgba"],
      div[style*="background-color: rgba"] {
        background: transparent !important;
        background-color: transparent !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  
    <!-- Audio for Safe Place Technique -->
    <audio id="safePlaceMusic" loop>
      <source src="sanctuary-of-light.mp3" type="audio/mpeg"/>
    </audio>
    
    <script>
      (function() {
        const audio = document.getElementById('safePlaceMusic');
        
        // Handle button clicks for audio control
        document.addEventListener('click', function(e) {
          const btn = e.target.closest('button');
          if (!btn) return;
          
          const text = btn.textContent.toLowerCase();
          
          if (text.includes('begin') || text.includes('start')) {
            if (audio.paused) {
              audio.play().catch(function(e) { console.log('Audio blocked:', e); });
            }
          } else if (text.includes('end') || text.includes('stop') || text.includes('pause')) {
            if (!audio.paused) {
              audio.pause();
              audio.currentTime = 0;
            }
          }
        });
        
        console.log('Audio control loaded');
      })();
    </script>
  </body>
</html>
