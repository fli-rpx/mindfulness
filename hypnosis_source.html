<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Emotional Balance - Self-Hypnosis</title>
    <script type="module" crossorigin="" src="hypnosis_source.js"></script>
    <link rel="stylesheet" crossorigin="" href="hypnosis_source.css"/>
    <base href="./">
  </head>
  <body>
    <div id="root"></div>
  
    <!-- Audio for Safe Place Technique -->
    <audio id="safePlaceMusic" loop>
      <source src="sanctuary-of-light.mp3" type="audio/mpeg"/>
    </audio>
    
    <script>
      (function() {
        const audio = document.getElementById('safePlaceMusic');
        
        // Handle button clicks for audio control
        document.addEventListener('click', function(e) {
          const btn = e.target.closest('button');
          if (!btn) return;
          
          const text = btn.textContent.toLowerCase();
          
          if (text.includes('begin') || text.includes('start')) {
            if (audio.paused) {
              audio.play().catch(function(e) { console.log('Audio blocked:', e); });
            }
          } else if (text.includes('end') || text.includes('stop') || text.includes('pause')) {
            if (!audio.paused) {
              audio.pause();
              audio.currentTime = 0;
            }
          }
        });
        
        // Remove gradient overlays in Safe Place section
        function removeSafePlaceGradients() {
          // Find by code-path attribute
          const byCodePath = document.querySelectorAll('[code-path*="App.tsx"]');
          byCodePath.forEach(function(el) {
            const text = el.textContent || '';
            const parentText = el.parentElement?.textContent || '';
            
            if (text.toLowerCase().includes('safe place') || 
                parentText.toLowerCase().includes('safe place') ||
                el.querySelector('h2, h3, h4, h5')?.textContent?.toLowerCase().includes('safe place')) {
              
              // Hide this gradient overlay
              el.style.setProperty('display', 'none', 'important');
              console.log('Hidden gradient overlay by code-path');
            }
          });
          
          // Find by gradient classes
          const gradientElements = document.querySelectorAll('.bg-gradient-to-br, .bg-gradient-to-r, .bg-gradient-to-b, [class*="gradient-to-"]');
          gradientElements.forEach(function(el) {
            // Check if inside Safe Place section
            let parent = el;
            for (let i = 0; i < 5; i++) {
              if (!parent) break;
              const text = parent.textContent || '';
              if (text.toLowerCase().includes('safe place')) {
                el.style.setProperty('display', 'none', 'important');
                console.log('Hidden gradient overlay by class');
                break;
              }
              parent = parent.parentElement;
            }
          });
          
          // Find absolute positioned overlay divs with backgrounds
          const absoluteDivs = document.querySelectorAll('div.absolute, div[class*="absolute"]');
          absoluteDivs.forEach(function(el) {
            const classes = el.className || '';
            if (classes.includes('bg-') || classes.includes('from-') || classes.includes('to-')) {
              let parent = el;
              for (let i = 0; i < 5; i++) {
                if (!parent) break;
                const text = parent.textContent || '';
                if (text.toLowerCase().includes('safe place')) {
                  el.style.setProperty('background', 'none', 'important');
                  el.style.setProperty('background-image', 'none', 'important');
                  console.log('Removed gradient from absolute div');
                  break;
                }
                parent = parent.parentElement;
              }
            }
          });
        }
        
        // Run multiple times
        setTimeout(removeSafePlaceGradients, 1000);
        setTimeout(removeSafePlaceGradients, 3000);
        setTimeout(removeSafePlaceGradients, 5000);
        
        console.log('Gradient removal script loaded');
      })();
    </script>
  </body>
</html>
