<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Emotional Balance - Self-Hypnosis</title>
    <script type="module" crossorigin="" src="hypnosis_source.js"></script>
    <link rel="stylesheet" crossorigin="" href="hypnosis_source.css"/>
    <base href="./">
  </head>
  <body>
    <div id="root"></div>
  
    <!-- Audio for Safe Place Technique -->
    <audio id="safePlaceMusic" loop>
      <source src="sanctuary-of-light.mp3" type="audio/mpeg"/>
    </audio>
    
    <script>
      (function() {
        const audio = document.getElementById('safePlaceMusic');
        
        // Simple audio control
        document.addEventListener('click', function(e) {
          const btn = e.target.closest('button');
          if (!btn) return;
          
          const text = btn.textContent.toLowerCase();
          
          if (text.includes('begin') || text.includes('start')) {
            if (audio.paused) {
              audio.play().catch(function(e) { console.log('Audio blocked:', e); });
            }
          } else if (text.includes('end') || text.includes('stop') || text.includes('pause')) {
            if (!audio.paused) {
              audio.pause();
              audio.currentTime = 0;
            }
          }
        });
        
        // Only hide the specific gradient overlay in Safe Place card
        setTimeout(function() {
          // Find by exact code-path
          const overlay = document.querySelector('[code-path="src/App.tsx:339:7"]');
          if (overlay) {
            // Check if it's inside Safe Place section
            let parent = overlay.parentElement;
            for (let i = 0; i < 3; i++) {
              if (!parent) break;
              if (parent.textContent.toLowerCase().includes('safe place')) {
                overlay.style.opacity = '0';
                console.log('Hidden Safe Place gradient overlay');
                break;
              }
              parent = parent.parentElement;
            }
          }
        }, 2000);
        
        console.log('Audio control loaded');
      })();
    </script>
  </body>
</html>
