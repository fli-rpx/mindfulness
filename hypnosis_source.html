<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Emotional Balance - Self-Hypnosis</title>
    <script type="module" crossorigin="" src="hypnosis_source.js"></script>
    <link rel="stylesheet" crossorigin="" href="hypnosis_source.css"/>
    <base href="./">
    <style>
      body { margin: 0; min-height: 100vh; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  
    <!-- Audio for Safe Place Technique -->
    <audio id="safePlaceMusic" loop>
      <source src="sanctuary-of-light.mp3" type="audio/mpeg"/>
    </audio>
    
    <script>
      // Hook into EXISTING buttons for audio control
      (function() {
        const audio = document.getElementById('safePlaceMusic');
        let isPlaying = false;
        
        // Function to handle button clicks
        function handleButtonClick(btnText) {
          const lowerText = btnText.toLowerCase();
          
          if (lowerText.includes('begin') || lowerText.includes('start')) {
            // Start music
            if (audio.paused) {
              audio.play().catch(function(e) {
                console.log('Audio play blocked:', e);
              });
              isPlaying = true;
            }
          } else if (lowerText.includes('end') || lowerText.includes('stop') || 
                     lowerText.includes('pause') || lowerText.includes('close')) {
            // Stop music
            if (!audio.paused) {
              audio.pause();
              audio.currentTime = 0;
              isPlaying = false;
            }
          }
        }
        
        // Watch for button clicks on the whole document
        document.addEventListener('click', function(e) {
          const btn = e.target.closest('button');
          if (btn) {
            handleButtonClick(btn.textContent);
          }
        });
        
        console.log('Audio control hooked to all buttons');
      })();
    </script>
  </body>
</html>
