<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Emotional Balance - Self-Hypnosis</title>
    <script type="module" crossorigin="" src="hypnosis_source.js"></script>
    <link rel="stylesheet" crossorigin="" href="hypnosis_source.css"/>
    <base href="./">
  </head>
  <body>
    <div id="root"></div>
  
    <!-- Audio for Safe Place Technique -->
    <audio id="safePlaceMusic" loop>
      <source src="sanctuary-of-light.mp3" type="audio/mpeg"/>
    </audio>
    
    <script>
      (function() {
        const audio = document.getElementById('safePlaceMusic');
        
        // Handle button clicks for audio control
        document.addEventListener('click', function(e) {
          const btn = e.target.closest('button');
          if (!btn) return;
          
          const text = btn.textContent.toLowerCase();
          
          if (text.includes('begin') || text.includes('start')) {
            if (audio.paused) {
              audio.play().catch(function(e) { console.log('Audio blocked:', e); });
            }
          } else if (text.includes('end') || text.includes('stop') || text.includes('pause')) {
            if (!audio.paused) {
              audio.pause();
              audio.currentTime = 0;
            }
          }
        });
        
        // Force transparent backgrounds on all elements after React renders
        function forceTransparent() {
          // Find all elements with backgrounds
          const allElements = document.querySelectorAll('*');
          let count = 0;
          
          allElements.forEach(function(el) {
            const style = window.getComputedStyle(el);
            const bg = style.backgroundColor;
            
            // If it has a semi-transparent or colored background (not fully transparent)
            if (bg && bg !== 'rgba(0, 0, 0, 0)' && bg !== 'transparent' && 
                (bg.includes('rgba') || bg.includes('rgb(2') || bg.includes('rgb(1'))) {
              
              // Check if this element or parent contains "Safe Place" text
              const text = el.textContent || '';
              const parentText = el.parentElement ? el.parentElement.textContent : '';
              
              if (text.toLowerCase().includes('safe place') || 
                  parentText.toLowerCase().includes('safe place') ||
                  el.querySelector('h2, h3, h4')?.textContent?.toLowerCase().includes('safe place')) {
                
                el.style.setProperty('background', 'transparent', 'important');
                el.style.setProperty('background-color', 'transparent', 'important');
                el.style.setProperty('backdrop-filter', 'none', 'important');
                el.style.setProperty('-webkit-backdrop-filter', 'none', 'important');
                count++;
              }
            }
          });
          
          console.log('Made ' + count + ' Safe Place elements transparent');
        }
        
        // Run multiple times as React may re-render
        setTimeout(forceTransparent, 2000);
        setTimeout(forceTransparent, 5000);
        setTimeout(forceTransparent, 8000);
        
        console.log('Audio control and transparency script loaded');
      })();
    </script>
  </body>
</html>
