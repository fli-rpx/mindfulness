<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Emotional Balance - Self-Hypnosis</title>
    <script type="module" crossorigin="" src="hypnosis_source.js"></script>
    <link rel="stylesheet" crossorigin="" href="hypnosis_source.css"/>
    <base href="./">
  </head>
  <body>
    <div id="root"></div>
  
    <!-- Audio for Safe Place Technique -->
    <audio id="safePlaceMusic" loop>
      <source src="sanctuary-of-light.mp3" type="audio/mpeg"/>
    </audio>
    
    <!-- Audio for Journey Section -->
    <audio id="journeyMusic" loop>
      <source src="sanctuary-of-stillness.mp3" type="audio/mpeg"/>
    </audio>
    
    <script>
      (function() {
        const safePlaceAudio = document.getElementById('safePlaceMusic');
        const journeyAudio = document.getElementById('journeyMusic');
        
        document.addEventListener('click', function(e) {
          const btn = e.target.closest('button');
          if (!btn) return;
          
          const text = btn.textContent.toLowerCase();
          
          // Safe Place buttons
          if (text.includes('begin visualization') || text.includes('start visualization')) {
            if (safePlaceAudio.paused) {
              safePlaceAudio.play().catch(function(e) { console.log('Safe Place audio blocked:', e); });
            }
          } else if (text.includes('end visualization') || text.includes('stop visualization')) {
            if (!safePlaceAudio.paused) {
              safePlaceAudio.pause();
              safePlaceAudio.currentTime = 0;
            }
          }
          
          // Journey Section - Next Step (always plays)
          else if (text.includes('next step') || text.includes('next')) {
            if (journeyAudio.paused) {
              journeyAudio.play().catch(function(e) { console.log('Journey audio blocked:', e); });
            }
          }
          // Journey Section - Previous (only if not playing)
          else if (text.includes('previous') || text.includes('back')) {
            if (journeyAudio.paused) {
              journeyAudio.play().catch(function(e) { console.log('Journey audio blocked:', e); });
            }
          }
            // Check if in Journey section
            let parent = btn.parentElement;
            let inJourney = false;
            for (let i = 0; i < 5; i++) {
              if (!parent) break;
              if (parent.textContent.toLowerCase().includes('self-hypnosis journey') ||
                  parent.textContent.toLowerCase().includes('your journey')) {
                inJourney = true;
                break;
              }
              parent = parent.parentElement;
            }
            
            if (inJourney) {
              if (journeyAudio.paused) {
                journeyAudio.play().catch(function(e) { console.log('Journey audio blocked:', e); });
              }
            }
          }
          
          // Journey Section - Complete (stop music)
          else if (text.includes('complete') || text.includes('finish')) {
            if (!journeyAudio.paused) {
              journeyAudio.pause();
              journeyAudio.currentTime = 0;
              console.log('Journey music stopped');
            }
            // Also stop Safe Place music if playing
            if (!safePlaceAudio.paused) {
              safePlaceAudio.pause();
              safePlaceAudio.currentTime = 0;
            }
          }
        });
        
        // Hide Safe Place gradient overlay
        setTimeout(function() {
          const overlay = document.querySelector('[code-path="src/App.tsx:339:7"]');
          if (overlay) {
            let parent = overlay.parentElement;
            for (let i = 0; i < 3; i++) {
              if (!parent) break;
              if (parent.textContent.toLowerCase().includes('safe place')) {
                overlay.style.opacity = '0';
                console.log('Hidden Safe Place gradient');
                break;
              }
              parent = parent.parentElement;
            }
          }
        }, 2000);
        
        console.log('Dual audio control loaded');
      })();
    </script>
  </body>
</html>
