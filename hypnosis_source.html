<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Emotional Balance - Self-Hypnosis</title>
    
    <!-- CSS to hide gradient overlays -->
    <style>
      /* Hide all gradient overlays that could be in Safe Place section */
      .absolute.inset-0[class*="bg-gradient"],
      .absolute.inset-0[class*="gradient-to"],
      div.absolute[class*="from-"],
      div.absolute[class*="to-"] {
        display: none !important;
      }
    </style>
    
    <script type="module" crossorigin="" src="hypnosis_source.js"></script>
    <link rel="stylesheet" crossorigin="" href="hypnosis_source.css"/>
    <base href="./">
  </head>
  <body>
    <div id="root"></div>
  
    <!-- Audio for Safe Place Technique -->
    <audio id="safePlaceMusic" loop>
      <source src="sanctuary-of-light.mp3" type="audio/mpeg"/>
    </audio>
    
    <script>
      (function() {
        const audio = document.getElementById('safePlaceMusic');
        
        document.addEventListener('click', function(e) {
          const btn = e.target.closest('button');
          if (!btn) return;
          
          const text = btn.textContent.toLowerCase();
          
          if (text.includes('begin visualization')) {
            if (audio.paused) {
              audio.play().catch(function(e) { console.log('Audio blocked:', e); });
            }
          } else if (text.includes('end visualization')) {
            if (!audio.paused) {
              audio.pause();
              audio.currentTime = 0;
            }
          }
        });
        
        console.log('Audio control loaded');
      })();
    </script>
  </body>
</html>
