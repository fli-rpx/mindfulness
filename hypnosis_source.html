<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Emotional Balance - Self-Hypnosis</title>
    <script type="module" crossorigin="" src="hypnosis_source.js"></script>
    <link rel="stylesheet" crossorigin="" href="hypnosis_source.css"/>
    <base href="./">
    <style>
      body { margin: 0; min-height: 100vh; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  
    <!-- Audio for Safe Place Technique -->
    <audio id="safePlaceMusic" loop>
      <source src="sanctuary-of-light.mp3" type="audio/mpeg"/>
    </audio>
    
    <script>
      (function() {
        const audio = document.getElementById('safePlaceMusic');
        
        // Handle button clicks for audio control
        document.addEventListener('click', function(e) {
          const btn = e.target.closest('button');
          if (!btn) return;
          
          const text = btn.textContent.toLowerCase();
          
          if (text.includes('begin') || text.includes('start')) {
            if (audio.paused) {
              audio.play().catch(function(e) { console.log('Audio blocked:', e); });
            }
          } else if (text.includes('end') || text.includes('stop') || text.includes('pause')) {
            if (!audio.paused) {
              audio.pause();
              audio.currentTime = 0;
            }
          }
        });
        
        // Make Safe Place panel/card background transparent
        setTimeout(function() {
          // Find the panel containing "Begin Visualization" button
          const buttons = document.querySelectorAll('button');
          for (let btn of buttons) {
            if (btn.textContent.toLowerCase().includes('begin visualization')) {
              // Go up to find the card/panel container
              let panel = btn.closest('div[class*="glass"], div[class*="card"], div[class*="panel"], div[style*="background"], .glass-card, .card, [class*="bg-"]');
              if (!panel) {
                panel = btn.parentElement;
                while (panel && panel.tagName !== 'BODY') {
                  const style = window.getComputedStyle(panel);
                  if (style.backgroundColor !== 'rgba(0, 0, 0, 0)' && style.backgroundColor !== 'transparent') {
                    break;
                  }
                  panel = panel.parentElement;
                }
              }
              if (panel && panel.tagName !== 'BODY') {
                panel.style.background = 'transparent';
                panel.style.backgroundColor = 'transparent';
                panel.style.backdropFilter = 'none';
                console.log('Safe Place panel made transparent');
              }
              break;
            }
          }
        }, 3000);
        
        console.log('Audio control and transparency script loaded');
      })();
    </script>
  </body>
</html>
