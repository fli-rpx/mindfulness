<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mindfulness Therapy — Emotional Wellness Platform">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <section class="hero">
        <div class="hero-container">
            <div class="hero-eyebrow">🤖 AI Emotional Assessment</div>
            <h1>Chat Naturally About Your Feelings</h1>
            <p class="hero-subtitle">Get insights about your emotional state through natural conversation</p>
        </div>
    </section>
    <script>
        function toggleToolsDropdown(btn) {
            var menu = btn.nextElementSibling;
            var open = menu.classList.toggle('open');
            btn.setAttribute('aria-expanded', open);
            if (open) {
                var r = btn.getBoundingClientRect();
                menu.style.top  = (r.bottom + window.scrollY + 6) + 'px';
                menu.style.left = r.left + 'px';
            }
        }
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.tools-dropdown-container')) {
                document.querySelectorAll('.tools-dropdown-menu').forEach(function(m){ m.classList.remove('open'); });
                document.querySelectorAll('.tools-dropdown-btn').forEach(function(b){ b.setAttribute('aria-expanded','false'); });
            }
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.querySelectorAll('.tools-dropdown-menu').forEach(function(m){ m.classList.remove('open'); });
            }
        });
        (function() {
            var btn = document.getElementById('mobile-menu-btn');
            var links = document.getElementById('nav-links');
            if (!btn || !links) return;
            btn.addEventListener('click', function() {
                var open = links.classList.toggle('mobile-open');
                btn.setAttribute('aria-expanded', open);
                btn.querySelector('i').className = open ? 'fas fa-times' : 'fas fa-bars';
            });
            links.querySelectorAll('a').forEach(function(a) {
                a.addEventListener('click', function() {
                    links.classList.remove('mobile-open');
                    btn.setAttribute('aria-expanded', 'false');
                    btn.querySelector('i').className = 'fas fa-bars';
                });
            });
        }());
    </script>

</body>
</html>
