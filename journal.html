<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="copyright" content="© 2026 Mindfulness Therapy. All rights reserved.">
    <title>Journal - Mindfulness Therapy</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Tools Dropdown Styles */
        .tools-dropdown-container { position: relative; display: inline-block; }
        .tools-dropdown-btn { display: flex; align-items: center; gap: 0.25rem; padding: 0.5rem 1rem; border: none; background: transparent; color: #64748b; font-size: 0.875rem; font-weight: 500; cursor: pointer; border-radius: 9999px; font-family: inherit; }
        .tools-dropdown-btn:hover { background: rgba(255, 255, 255, 0.1); color: #1e293b; }
        .tools-dropdown-btn.active { background: #14b8a6; color: #1e293b; }
        .tools-dropdown-menu { display: none; position: fixed; top: auto; left: auto; margin-top: 0.5rem; background: white; border: 1px solid #e2e8f0; border-radius: 0.75rem; box-shadow: 0 10px 40px rgba(0,0,0,0.15); min-width: 220px; padding: 0.5rem; z-index: 9999; }
        .tools-dropdown-menu.open { display: block; }
        .tools-dropdown-menu a { display: block; padding: 0.75rem 1rem; color: #1e293b; text-decoration: none; font-size: 0.875rem; border-radius: 0.5rem; transition: all 0.2s; white-space: nowrap; }
        .tools-dropdown-menu a:hover { background: rgba(20, 184, 166, 0.1); color: #14b8a6; }

        /* Page Styles */
        .page-container { max-width: 800px; margin: 0 auto; padding: 100px 20px 40px 20px; }
        .page-header { text-align: center; margin-bottom: 3rem; }
        .page-header h1 { font-size: 2.5rem; background: linear-gradient(90deg, #50c8b8, #4a90d9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 1rem; }
        .page-header p { color: #64748b; font-size: 1.1rem; }

        /* Journal Styles */
        .journal-section { display: flex; flex-direction: column; gap: 2rem; }
        
        .mood-tracker-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }
        
        .mood-tracker-card h3 {
            color: #1e293b;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .mood-scale {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .mood-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            border: 2px solid transparent;
            border-radius: 1rem;
            background: rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .mood-btn:hover {
            border-color: #50c8b8;
            transform: translateY(-2px);
        }
        
        .mood-btn.selected {
            border-color: #50c8b8;
            background: rgba(80, 200, 184, 0.2);
        }
        
        .mood-emoji {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .mood-label {
            font-size: 0.875rem;
            color: #64748b;
        }
        
        .quick-entry-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }
        
        .quick-entry-card h3 {
            color: #1e293b;
            margin-bottom: 0.5rem;
        }
        
        .prompt {
            color: #50c8b8;
            font-style: italic;
            margin-bottom: 1rem;
        }
        
        textarea {
            width: 100%;
            padding: 1rem;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: #1e293b;
            font-size: 1rem;
            resize: vertical;
            min-height: 150px;
            font-family: inherit;
        }
        
        textarea::placeholder {
            color: #94a3b8;
        }
        
        .entry-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #50c8b8, #4a90d9);
            color: #1e293b;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #64748b;
            padding: 0.75rem 1.5rem;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        
        #journalEntries {
            margin-top: 2rem;
        }
        
        .journal-entry {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .entry-date {
            color: #50c8b8;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }
        
        .entry-mood {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .entry-text {
            color: #334155;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav-bar" style="position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(30, 58, 138, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 2rem; height: 60px;">
        <div class="nav-brand" onclick="window.location.href='index.html'" style="cursor: pointer; font-size: 1.25rem; font-weight: 600; color: #1e293b;">🧘 Mindfulness Therapy</div>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()" style="display: none; background: none; border: none; font-size: 1.25rem; color: #64748b; cursor: pointer; padding: 0.5rem;">
            <i class="fas fa-bars"></i>
        </button>
        <div class="nav-links" id="navLinks" style="display: flex; gap: 0.5rem; align-items: center;">
            <button class="nav-btn" onclick="window.location.href='index.html'" style="padding: 0.5rem 1rem; border: none; border-radius: 0.5rem; background: transparent; color: #64748b; font-size: 0.875rem; font-weight: 500; cursor: pointer;">Home</button>
            <button class="nav-btn" onclick="window.location.href='cycle.html'" style="padding: 0.5rem 1rem; border: none; border-radius: 0.5rem; background: transparent; color: #64748b; font-size: 0.875rem; font-weight: 500; cursor: pointer;">Cycle</button>
            <button class="nav-btn" onclick="window.location.href='assessment.html'" style="padding: 0.5rem 1rem; border: none; border-radius: 0.5rem; background: transparent; color: #64748b; font-size: 0.875rem; font-weight: 500; cursor: pointer;">AI Chat</button>

            <!-- Tools Dropdown -->
            <div class="tools-dropdown-container" id="toolsContainer">
                <button class="tools-dropdown-btn" id="toolsBtn" type="button" onclick="toggleToolsMenu();">
                    Tools <i class="fas fa-chevron-down" style="font-size: 0.75rem;"></i>
                </button>
                <div class="tools-dropdown-menu" id="toolsMenu">
                    <a href="emotion-explorer.html">🎨 Emotion Explorer</a>
                    <a href="emotion-balance.html">⚡ Emotion Balance</a>
                    <a href="hypnosis.html">🌀 Hypnosis</a>
                    <a href="salad-compass.html">🥗 Salad Compass</a>
                    <a href="salad-check.html">🥬 Full Salad Check</a>
                    <a href="interventions.html">🧰 Interventions</a>
                </div>
            </div>

            <button class="nav-btn active" onclick="window.location.href='journal.html'" style="padding: 0.5rem 1rem; border: none; border-radius: 0.5rem; background: linear-gradient(135deg, #50c8b8, #4a90d9); color: #1e293b; font-size: 0.875rem; font-weight: 500; cursor: pointer;">Journal</button>
            <button class="nav-btn" onclick="window.location.href='progress.html'" style="padding: 0.5rem 1rem; border: none; border-radius: 0.5rem; background: transparent; color: #64748b; font-size: 0.875rem; font-weight: 500; cursor: pointer;">Progress</button>
            <button class="nav-btn" onclick="window.location.href='learn.html'" style="padding: 0.5rem 1rem; border: none; border-radius: 0.5rem; background: transparent; color: #64748b; font-size: 0.875rem; font-weight: 500; cursor: pointer;">Learn</button>
        </div>
    </nav>

    <div class="page-container">
        <div class="page-header">
            <h1>📔 Journal</h1>
            <p>Track your moods and reflect on your journey. Every entry is a step toward self-awareness.</p>
        </div>

        <div class="journal-section">
            <div class="mood-tracker-card">
                <h3>How are you feeling?</h3>
                <div class="mood-scale">
                    <button class="mood-btn" data-mood="1" onclick="logMood(1)">
                        <span class="mood-emoji">😢</span>
                        <span class="mood-label">Sad</span>
                    </button>
                    <button class="mood-btn" data-mood="2" onclick="logMood(2)">
                        <span class="mood-emoji">😕</span>
                        <span class="mood-label">Down</span>
                    </button>
                    <button class="mood-btn" data-mood="3" onclick="logMood(3)">
                        <span class="mood-emoji">😐</span>
                        <span class="mood-label">Okay</span>
                    </button>
                    <button class="mood-btn" data-mood="4" onclick="logMood(4)">
                        <span class="mood-emoji">🙂</span>
                        <span class="mood-label">Good</span>
                    </button>
                    <button class="mood-btn" data-mood="5" onclick="logMood(5)">
                        <span class="mood-emoji">😊</span>
                        <span class="mood-label">Great</span>
                    </button>
                </div>
            </div>

            <div class="quick-entry-card">
                <h3>Quick Entry</h3>
                <p class="prompt" id="journalPrompt">What are you grateful for today?</p>
                <textarea id="journalText" placeholder="Write your thoughts..."></textarea>
                <div class="entry-actions">
                    <button class="btn-secondary" onclick="newJournalPrompt()">New Prompt</button>
                    <button class="btn-primary" onclick="saveJournalEntry()">Save Entry</button>
                </div>
            </div>

            <div id="journalEntries"></div>
        </div>
    </div>

    <script>
        // Tools dropdown functions
        function toggleToolsMenu() {
            var menu = document.getElementById('toolsMenu');
            var btn = document.getElementById('toolsBtn');
            if (!menu || !btn) return;
            
            if (menu.classList.contains('open')) {
                menu.classList.remove('open');
                btn.classList.remove('active');
                btn.setAttribute('aria-expanded', 'false');
            } else {
                var btnRect = btn.getBoundingClientRect();
                menu.style.top = (btnRect.bottom + 8) + 'px';
                menu.style.left = btnRect.left + 'px';
                menu.classList.add('open');
                btn.classList.add('active');
                btn.setAttribute('aria-expanded', 'true');
            }
        }
        
        function closeToolsDropdown() {
            var menu = document.getElementById('toolsMenu');
            var btn = document.getElementById('toolsBtn');
            if (menu) {
                menu.classList.remove('open');
            }
            if (btn) {
                btn.classList.remove('active');
                btn.setAttribute('aria-expanded', 'false');
            }
        }
        
        document.addEventListener('click', function(e) {
            var btn = document.getElementById('toolsBtn');
            var menu = document.getElementById('toolsMenu');
            if (btn && menu && !btn.contains(e.target) && !menu.contains(e.target)) {
                closeToolsDropdown();
            }
        });

        function toggleMobileMenu() {
            const navLinks = document.getElementById('navLinks');
            navLinks.classList.toggle('show');
        }

        // Journal functions
        const prompts = [
            "What are you grateful for today?",
            "What emotion was strongest for you today?",
            "What challenged you today?",
            "What made you smile today?",
            "What would you tell your future self?",
            "What are you looking forward to?",
            "What did you learn about yourself today?"
        ];

        function logMood(mood) {
            // Remove selected class from all buttons
            document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('selected'));
            // Add selected class to clicked button
            document.querySelector(`[data-mood="${mood}"]`).classList.add('selected');
            
            // Save to localStorage
            const today = new Date().toISOString().split('T')[0];
            localStorage.setItem(`mood_${today}`, mood);
            
            alert(`Mood logged: ${mood}/5`);
        }

        function newJournalPrompt() {
            const randomPrompt = prompts[Math.floor(Math.random() * prompts.length)];
            document.getElementById('journalPrompt').textContent = randomPrompt;
        }

        function saveJournalEntry() {
            const text = document.getElementById('journalText').value;
            const prompt = document.getElementById('journalPrompt').textContent;
            
            if (!text.trim()) {
                alert('Please write something before saving.');
                return;
            }

            const entry = {
                date: new Date().toISOString(),
                prompt: prompt,
                text: text,
                mood: localStorage.getItem(`mood_${new Date().toISOString().split('T')[0]}`) || 'Not recorded'
            };

            // Get existing entries
            let entries = JSON.parse(localStorage.getItem('journalEntries') || '[]');
            entries.unshift(entry);
            localStorage.setItem('journalEntries', JSON.stringify(entries));

            // Clear textarea
            document.getElementById('journalText').value = '';
            
            // Display entries
            displayEntries();
            
            alert('Entry saved!');
        }

        function displayEntries() {
            const entries = JSON.parse(localStorage.getItem('journalEntries') || '[]');
            const container = document.getElementById('journalEntries');
            
            if (entries.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #64748b;">No entries yet. Start writing! ✍️</p>';
                return;
            }

            container.innerHTML = entries.map(entry => {
                const date = new Date(entry.date);
                const dateStr = date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                const moodEmojis = ['', '😢', '😕', '😐', '🙂', '😊'];
                const moodEmoji = moodEmojis[entry.mood] || '📝';
                
                return `
                    <div class="journal-entry">
                        <div class="entry-date">${dateStr}</div>
                        <div class="entry-mood">${moodEmoji}</div>
                        <div class="entry-text">${entry.text}</div>
                    </div>
                `;
            }).join('');
        }

        // Load entries on page load
        displayEntries();
    </script>
</body>
</html>
