<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="copyright" content="© 2026 正念疗法. 保留所有权利.">
    <title>情绪平衡工具 - 正念疗法</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #fafaf9;
            --surface: #ffffff;
            --text: #1c1917;
            --muted: #78716c;
            --border: #e7e5e4;
            --accent: #0d9488;
            --accent-dark: #0f766e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        h1, h2, h3 { font-family: 'Noto Serif SC', 'Cormorant Garamond', serif; font-weight: 500; }
        
        /* Navigation */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(30, 58, 138, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }
        .nav-logo {
            font-family: 'Noto Serif SC', 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e293b; 
            text-decoration: none;
        }
        .nav-links { display: flex; gap: 0.25rem; }
        .nav-link {
            padding: 0.5rem 1rem;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .nav-link:hover { color: #1e293b;  background: rgba(255,255,255,0.1); }
        .nav-link.active { color: var(--accent); background: rgba(13,148,136,0.2); }
        
        /* Hero */
        .hero {
            padding: 160px 2rem 100px;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59, 130, 246, 0.2), transparent),
                linear-gradient(180deg, #1e3a8a 0%, #1e40af 50%, var(--bg) 100%);
            color: #1e293b; 
        }
        .hero h1 { color: #1e293b;  }
        .hero-subtitle { color: rgba(255,255,255,0.7); }
        .hero-container {
            max-width: 720px;
            margin: 0 auto;
            text-align: center;
        }
        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(13,148,136,0.1);
            border: 1px solid rgba(13,148,136,0.2);
            border-radius: 100px;
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1.5rem;
        }
        .hero h1 {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            line-height: 1.1;
            margin-bottom: 1.25rem;
        }
        .hero-subtitle {
            font-size: 1.125rem;
            opacity: 0.8;
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* Main Content */
        .content-main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
        
        /* Balance Content */
        .balance-content {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .balance-card {
            background: var(--surface);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 2.5rem;
            margin-bottom: 2rem;
        }
        
        .balance-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .balance-header h1 {
            font-size: 2rem;
            background: linear-gradient(90deg, var(--accent), var(--accent-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        
        .balance-header .subtitle {
            color: var(--muted);
            font-size: 1rem;
        }
        
        .slider-question {
            margin-bottom: 2rem;
        }
        
        .slider-question label {
            display: block;
            margin-bottom: 1rem;
            font-size: 1.1rem;
            color: var(--text);
            font-weight: 500;
        }
        
        .slider-container {
            position: relative;
        }
        
        .slider-track {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: var(--border);
            outline: none;
            -webkit-appearance: none;
        }
        
        .slider-track::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(13, 148, 136, 0.4);
            transition: transform 0.2s;
        }
        
        .slider-track::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }
        
        .slider-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: var(--muted);
        }
        
        .slider-value {
            text-align: center;
            margin-top: 0.5rem;
            font-size: 1.2rem;
            color: var(--accent);
            font-weight: 600;
        }
        
        .analyze-btn {
            width: 100%;
            padding: 1rem;
            margin-top: 1.5rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #1e293b; 
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(13, 148, 136, 0.3);
        }
        
        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(13, 148, 136, 0.4);
        }
        
        .result-section {
            display: none;
            margin-top: 2rem;
            padding: 2rem;
            border-radius: 15px;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            animation: fadeIn 0.5s ease;
        }
        
        .result-section.show {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .score-display {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            position: relative;
            background: var(--bg);
            border: 2px solid var(--border);
        }
        
        .score-circle::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: conic-gradient(var(--score-color) var(--score-deg), var(--border) 0);
            z-index: -1;
        }
        
        .state-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--score-color);
        }
        
        .state-description {
            color: var(--muted);
            line-height: 1.6;
        }
        
        .advice-section {
            margin-top: 2rem;
        }
        
        .advice-section h3 {
            color: var(--accent);
            margin-bottom: 1rem;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .advice-list {
            list-style: none;
        }
        
        .advice-list li {
            padding: 0.75rem 0;
            padding-left: 1.5rem;
            position: relative;
            color: var(--text);
            line-height: 1.6;
            border-bottom: 1px solid var(--border);
        }
        
        .advice-list li:last-child {
            border-bottom: none;
        }
        
        .advice-list li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: bold;
        }
        
        .quick-actions-section {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }
        
        .quick-actions-section h3 {
            color: var(--accent-dark);
            margin-bottom: 1rem;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        
        .action-btn {
            padding: 1rem;
            border-radius: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .action-btn:hover {
            background: rgba(13,148,136,0.1);
            border-color: var(--accent);
            transform: translateY(-1px);
        }
        
        .breathing-exercise {
            display: none;
            margin-top: 2rem;
            padding: 2rem;
            text-align: center;
            background: rgba(13,148,136,0.1);
            border-radius: 15px;
            border: 1px solid rgba(13,148,136,0.2);
        }
        
        .breathing-exercise.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        .breathing-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            margin: 1.5rem auto;
            animation: breathe 4s ease-in-out infinite;
        }
        
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.3); opacity: 1; }
        }
        
        .reset-btn {
            margin-top: 1.5rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
        }
        
        .reset-btn:hover {
            background: rgba(0,0,0,0.02);
            color: var(--text);
        }
        
        /* Tools Dropdown */
        .tools-dropdown-container {
            position: relative;
            display: inline-block;
        }
        .tools-dropdown-btn {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.5rem 1rem;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.8);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .tools-dropdown-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #1e293b; 
        }
        .tools-dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 0.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            min-width: 220px;
            padding: 0.5rem;
            z-index: 9999;
        }
        .tools-dropdown-menu.open {
            display: block;
        }
        .tools-dropdown-menu a {
            display: block;
            padding: 0.75rem 1rem;
            color: var(--text);
            text-decoration: none;
            font-size: 0.875rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tools-dropdown-menu a:hover {
            background: rgba(13,148,136,0.1);
            color: var(--accent);
        }
        
        @media (max-width: 768px) {
            .nav-links {
                flex-direction: column;
                gap: 0.5rem;
            }
            .hero {
                padding: 120px 1rem 60px;
            }
            .content-main {
                padding: 2rem 1rem;
            }
            .action-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <nav class="nav">
        <div class="nav-container">

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-container">
            <div class="hero-eyebrow">⚡ 情绪平衡</div>
            <h1>情绪平衡工具</h1>
            <p class="hero-subtitle">检查状态。获得平衡。继续前进。</p>
        </div>
    </section>

    <!-- Main Content -->
    <main class="content-main">
        <div class="balance-content">
            <div class="balance-card">
                <div class="balance-header">
                    <h1>⚡ 情绪平衡工具</h1>
                    <p class="subtitle">检查状态。获得平衡。继续前进。</p>
                </div>
                
                <div id="quiz-section">
                    <div class="slider-question">
                        <label>1. 能量水平</label>
                        <div class="slider-container">
                            <input type="range" id="energy" class="slider-track" min="1" max="10" value="5" oninput="updateValue('energy', this.value)">
                            <div class="slider-labels">
                                <span>疲惫</span>
                                <span>平衡</span>
                                <span>兴奋</span>
                            </div>
                            <div class="slider-value" id="energy-val">5</div>
                        </div>
                    </div>
                    
                    <div class="slider-question">
                        <label>2. 思维清晰度</label>
                        <div class="slider-container">
                            <input type="range" id="clarity" class="slider-track" min="1" max="10" value="5" oninput="updateValue('clarity', this.value)">
                            <div class="slider-labels">
                                <span>模糊</span>
                                <span>清晰</span>
                                <span>敏锐</span>
                            </div>
                            <div class="slider-value" id="clarity-val">5</div>
                        </div>
                    </div>
                    
                    <div class="slider-question">
                        <label>3. 情绪稳定性</label>
                        <div class="slider-container">
                            <input type="range" id="stability" class="slider-track" min="1" max="10" value="5" oninput="updateValue('stability', this.value)">
                            <div class="slider-labels">
                                <span>不稳定</span>
                                <span>稳定</span>
                                <span>专注</span>
                            </div>
                            <div class="slider-value" id="stability-val">5</div>
                        </div>
                    </div>
                    
                    <div class="slider-question">
                        <label>4. 压力水平</label>
                        <div class="slider-container">
                            <input type="range" id="stress" class="slider-track" min="1" max="10" value="5" oninput="updateValue('stress', this.value)">
                            <div class="slider-labels">
                                <span>平静</span>
                                <span>可控</span>
                                <span>不堪重负</span>
                            </div>
                            <div class="slider-value" id="stress-val">5</div>
                        </div>
                    </div>
                    
                    <button class="analyze-btn" onclick="calculateState()">
                        <i class="fas fa-chart-line"></i> 分析我的状态
                    </button>
                </div>
                
                <div id="result-section" class="result-section">
                    <div class="score-display">
                        <div class="score-circle" id="score-circle">--</div>
                        <h2 class="state-title" id="state-title">--</h2>
                        <p class="state-description" id="state-desc"></p>
                    </div>
                    
                    <div class="advice-section">
                        <h3><i class="fas fa-bullseye"></i> 快速再平衡行动</h3>
                        <ul class="advice-list" id="advice-list"></ul>
                    </div>
                    
                    <div class="quick-actions-section">
                        <h3><i class="fas fa-bolt"></i> 即时工具</h3>
                        <div class="action-grid">
                            <button class="action-btn" onclick="showBreathing()">
                                <i class="fas fa-lungs"></i> 呼吸
                            </button>
                            <button class="action-btn" onclick="groundingExercise()">
                                <i class="fas fa-globe"></i> 接地
                            </button>
                            <button class="action-btn" onclick="resetTool()">
                                <i class="fas fa-redo"></i> 重置
                            </button>
                            <button class="action-btn" onclick="window.open('https://www.youtube.com/results?search_query=lofi+beats', '_blank')">
                                <i class="fas fa-music"></i> 轻音乐
                            </button>
                        </div>
                    </div>
                    
                    <div id="breathing-section" class="breathing-exercise">
                        <p style="color: var(--accent); font-weight: 500;">跟着圆圈呼吸...</p>
                        <div class="breathing-circle"></div>
                        <p style="color: var(--muted); font-size: 0.9rem;">圆圈扩大时吸气，缩小时呼气</p>
                        <button class="action-btn reset-btn" onclick="hideBreathing()" style="margin-top: 15px;">
                            <i class="fas fa-stop"></i> 停止
                        </button>
                    </div>
                    
                    <button class="action-btn reset-btn" onclick="resetAll()" style="width: 100%; margin-top: 2rem;">
                        <i class="fas fa-redo"></i> 再次检查
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Tools dropdown functions
        function toggleToolsMenu() {
            var menu = document.getElementById('toolsMenu');
            var btn = document.querySelector('.tools-dropdown-btn');
            if (!menu || !btn) return;
            
            if (menu.classList.contains('open')) {
                menu.classList.remove('open');
            } else {
                menu.classList.add('open');
            }
        }
        
        document.addEventListener('click', function(e) {
            var btn = document.querySelector('.tools-dropdown-btn');
            var menu = document.getElementById('toolsMenu');
            if (btn && menu && !btn.contains(e.target) && !menu.contains(e.target)) {
                menu.classList.remove('open');
            }
        });

        function updateValue(id, value) {
            document.getElementById(id + '-val').textContent = value;
        }
        
        function calculateState() {
            const energy = parseInt(document.getElementById('energy').value);
            const clarity = parseInt(document.getElementById('clarity').value);
            const stability = parseInt(document.getElementById('stability').value);
            const stress = parseInt(document.getElementById('stress').value);
            
            // Calculate balance score (stress is inverted)
            const balanceScore = Math.round((energy + clarity + stability + (11 - stress)) / 4 * 10);
            
            // Determine state
            let state, color, desc, advice;
            
            if (balanceScore >= 80) {
                state = "⚡ 巅峰状态";
                color = "#0d9488";
                desc = "你处于很强的位置。将这种能量投入到有意义的工作中。";
                advice = [
                    "现在处理最重要的任务——你很敏锐",
                    "记录有效的方法，以便你可以复制它",
                    "帮助别人——你的清晰度具有感染力",
                    "设定界限：保护这种状态免受干扰"
                ];
            } else if (balanceScore >= 60) {
                state = "🌊 平衡流动";
                color = "#0f766e";
                desc = "良好的平衡。小的调整将优化你的一天。";
                advice = [
                    "散步5分钟以维持动力",
                    "喝水——水合作用对清晰度的影响比你想象的更大",
                    "做一件能推动你主要目标前进的事情",
                    "2小时后再次检查自己"
                ];
            } else if (balanceScore >= 40) {
                state = "��️ 漂移模式";
                color = "#f59e0b";
                desc = "你有功能，但没有全速运转。是时候重新校准了。";
                advice = [
                    "关闭除你需要的那个标签之外的所有标签",
                    "进行2分钟身体扫描——你在哪里感到紧张？",
                    "如果你最近没有吃东西，吃点含蛋白质的食物",
                    "降低标准：你能采取的最小下一步是什么？"
                ];
            } else {
                state = "⛈️ 风暴模式";
                color = "#dc2626";
                desc = "你的系统需要照顾，然后才能提高效率。恢复优先。";
                advice = [
                    "至少离开屏幕10分钟",
                    "说出你能看到、听到和感觉到的三件事（接地）",
                    "给你信任的人发短信：'正在经历困难时刻'",
                    "问：我现在能为自己做的最善良的事情是什么？",
                    "考虑将非紧急任务推迟到明天"
                ];
            }
            
            // Display results
            const resultDiv = document.getElementById('result-section');
            const scoreCircle = document.getElementById('score-circle');
            const stateTitle = document.getElementById('state-title');
            
            scoreCircle.textContent = balanceScore;
            scoreCircle.style.setProperty('--score-color', color);
            scoreCircle.style.setProperty('--score-deg', (balanceScore * 3.6) + 'deg');
            
            stateTitle.textContent = state;
            stateTitle.style.setProperty('--score-color', color);
            
            document.getElementById('state-desc').textContent = desc;
            
            const adviceList = document.getElementById('advice-list');
            adviceList.innerHTML = advice.map(a => `<li>${a}</li>`).join('');
            
            document.getElementById('quiz-section').style.display = 'none';
            resultDiv.classList.add('show');
            
            // Scroll to results
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        
        function showBreathing() {
            document.getElementById('breathing-section').classList.add('show');
        }
        
        function hideBreathing() {
            document.getElementById('breathing-section').classList.remove('show');
        }
        
        function groundingExercise() {
            alert(`5-4-3-2-1 接地练习：

��️ 你能看到的5样东西
👂 你能听到的4种声音
✋ 你能触摸到的3样东西
�� 你能闻到的2种气味
👅 你能尝到的1种味道

慢慢来。回到当下。`);
        }
        
        function resetTool() {
            document.getElementById('energy').value = 5;
            document.getElementById('clarity').value = 5;
            document.getElementById('stability').value = 5;
            document.getElementById('stress').value = 5;
            
            ['energy', 'clarity', 'stability', 'stress'].forEach(id => {
                document.getElementById(id + '-val').textContent = '5';
            });
        }
        
        function resetAll() {
            document.getElementById('result-section').classList.remove('show');
            document.getElementById('quiz-section').style.display = 'block';
            hideBreathing();
            resetTool();
            
            // Scroll back to top
            document.querySelector('.balance-card').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
