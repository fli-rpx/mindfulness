<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="copyright" content="© 2026 Mindfulness Therapy. All rights reserved.">
    <title>NEURO·CONTEMPLATIVE - Mindfulness Therapy</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(30, 58, 138, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
            height: 70px;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }
        .nav-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
            text-decoration: none;
        }
        .nav-links { display: flex; gap: 0.25rem; align-items: center; }
        .nav-link {
            padding: 0.5rem 1rem;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .nav-link:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-link.active { color: #0d9488; background: rgba(13,148,136,0.2); }

        /* Tools Dropdown */
        .tools-dropdown-container { position: relative; display: inline-block; }
        .tools-dropdown-btn {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.5rem 1rem;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.8);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .tools-dropdown-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .tools-dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 0.5rem;
            background: white;
            border: 1px solid #e7e5e4;
            border-radius: 0.75rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            min-width: 220px;
            padding: 0.5rem;
            z-index: 1001;
        }
        .tools-dropdown-menu.open { display: block; }
        .tools-dropdown-menu a {
            display: block;
            padding: 0.75rem 1rem;
            color: #1c1917;
            text-decoration: none;
            font-size: 0.875rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tools-dropdown-menu a:hover { background: rgba(13,148,136,0.1); color: #0d9488; }
        .tools-dropdown-menu a.active { color: #0d9488; font-weight: 600; }

        /* Iframe Container */
        .iframe-container {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: calc(100vh - 70px);
        }
        
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">🧘 Mindfulness Therapy</a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="cycle.html" class="nav-link">Cycle</a>
                <a href="assessment.html" class="nav-link">AI Chat</a>

                <div class="tools-dropdown-container">
                    <button class="tools-dropdown-btn" onclick="toggleToolsDropdown(this)">
                        Tools <i class="fas fa-chevron-down"></i>
                    </button>
                                        <div class="tools-dropdown-menu" id="toolsMenu">
                        <a href="emotion-explorer.html">🎨 Emotion Explorer</a>
                        <a href="emotion-balance.html">⚡ Emotion Balance</a>
                        <a href="emotion-meditation.html">🌬️ Emotion Meditation</a>
                        <a href="expectation-cooling.html">❄️ Expectation Cooling</a>
                        <a href="hypnosis.html">🌀 Hypnosis</a>
                        <a href="neuro.html" class="active">🧠 Neuro·Contemplative</a>
                        <a href="salad-compass.html">🥗 Salad Compass</a>
                        <a href="salad-check.html">🥬 Full Salad Check</a>
                        <a href="interventions.html">🧰 Interventions</a>
                        <a href="connection.html">🤝 Connection</a>
                    </div>
                </div>

                <a href="journal.html" class="nav-link">Journal</a>
                <a href="progress.html" class="nav-link">Progress</a>
                <a href="learn.html" class="nav-link">Learn</a>
            </div>
        </div>
    </nav>

    <!-- Iframe with Neuro Contemplative app -->
    <div class="iframe-container">
        <iframe src="neuro_source.html" 
                title="NEURO·CONTEMPLATIVE - The Ego as Physiological Process"
                allow="fullscreen"
                loading="lazy">
        </iframe>
    </div>

    <script>
        function toggleToolsDropdown(btn) {
            const menu = btn.nextElementSibling;
            menu.classList.toggle('open');
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.tools-dropdown-container')) {
                document.querySelectorAll('.tools-dropdown-menu').forEach(menu => {
                    menu.classList.remove('open');
                });
            }
        });
    </script>
</body>
</html>
